server {
    listen 8080;
    root /usr/share/nginx/html;
    index index.html;

    # 支持 .usdz 文件的 MIME 类型（iOS AR Quick Look 需要）
    types {
        text/html                   html htm;
        text/css                    css;
        application/javascript      js;
        image/png                   png;
        image/jpeg                  jpg jpeg;
        model/vnd.usdz+zip          usdz;
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    # 允许跨域（AR Quick Look 需要）
    add_header Access-Control-Allow-Origin *;
}
